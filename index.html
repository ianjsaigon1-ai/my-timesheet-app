<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher's Timesheet Record</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Comic+Neue:wght@400;700&family=Gloria+Hallelujah&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --paper-bg: #fff9e6;
            --line-color: #e8e0cc;
            --margin-red: #ffbdbd;
            --text-dark: #000;
            --ui-accent: #4a6fa5;
            --chalkboard: #2d5a27;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Comic Neue', cursive;
            background-color: #dcdcdc;
            color: #333;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        #save-popup {
            position: fixed;
            top: 20px;
            background: #28a745;
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            font-family: 'Fredoka One', cursive;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none;
            z-index: 10000;
        }

        .tab-wrapper {
            width: 100%;
            max-width: 950px;
            display: flex;
            gap: 5px;
            padding-left: 60px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .school-tab {
            background: #d1ccb9;
            padding: 10px 20px;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            font-size: 0.9rem;
            color: #555;
            border: 1px solid #b1ac99;
            border-bottom: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .school-tab.active {
            background: var(--paper-bg);
            color: var(--ui-accent);
            padding-top: 15px;
            margin-top: -5px;
            z-index: 10;
        }

        .add-tab-btn {
            background: #4caf50;
            color: white;
            padding: 5px 15px;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            border: none;
            font-size: 1.2rem;
        }

        .container {
            background-color: var(--paper-bg);
            width: 100%;
            max-width: 950px;
            min-height: 1100px;
            padding: 40px 50px 60px 75px;
            position: relative;
            border: 1px solid #d1ccb9;
            box-shadow: 12px 12px 25px rgba(0,0,0,0.15);
            border-bottom-right-radius: 80px 15px;
            z-index: 5;
            margin-top: -1px;
        }

        .container::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 2.4rem;
            pointer-events: none; z-index: 0;
        }

        .container::before {
            content: '';
            position: absolute; left: 55px; top: 0; bottom: 0; width: 2px;
            background-color: var(--margin-red); z-index: 1;
        }

        .content-layer { position: relative; z-index: 2; }

        header { text-align: center; margin-bottom: 25px; }
        header h1 { 
            font-family: 'Gloria Hallelujah', cursive; 
            font-size: 2.5rem; 
            color: #000; 
            font-weight: 400;
            text-decoration: underline;
            text-underline-offset: 12px;
            text-decoration-thickness: 2px;
        }

        .print-top-block {
            display: none; 
            justify-content: space-between;
            background: white;
            padding: 15px 20px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .section-box, .white-card {
            background: white;
            padding: 12px 20px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .one-line-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); 
            gap: 15px; 
            align-items: end;
        }

        .form-group { display: flex; flex-direction: column; position: relative; }
        label { font-weight: normal; font-size: 0.62rem; color: #777; text-transform: uppercase; margin-bottom: 3px; text-align: center; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-family: 'Comic Neue', cursive; font-size: 0.85rem; width: 100%; text-align: center; }

        .time-clock-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 15px; align-items: flex-end; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        th { text-align: center; padding: 10px; background: #fafafa; border-bottom: 2px solid #000; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }

        .chalkboard-box {
            background: var(--chalkboard);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-top: 25px;
            font-family: 'Gloria Hallelujah', cursive;
            border: 8px solid #5d4037;
        }

        .total-item { display: flex; justify-content: space-between; font-size: 1.2rem; margin-bottom: 5px; }
        .line-sep { border-top: 1px dashed rgba(255,255,255,0.3); margin: 10px 0; padding-top: 10px; }
        .net-due { font-size: 1.6rem; color: #fdfd96; text-decoration: underline; }

        .section-header { font-family: 'Comic Neue', cursive; font-weight: 400; color: var(--ui-accent); display: block; margin-bottom: 10px; font-size: 1rem; text-align: center; }
        .history-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dotted #ddd; }

        .controls { display: flex; gap: 10px; margin-top: 25px; justify-content: center; flex-wrap: wrap; }
        button { padding: 10px 20px; border: 1px solid #bbb; border-radius: 8px; font-family: 'Comic Neue', cursive; cursor: pointer; background: white; transition: 0.3s; }
        .btn-add { background: var(--ui-accent); color: white; border: none; }

        @media print {
            .no-print, .tab-wrapper, button, .fa-trash, .fa-times { display: none !important; }
            .container { box-shadow: none !important; border: 1px solid #d1ccb9 !important; }
            .print-top-block { display: flex !important; }
        }
    </style>
</head>
<body>

    <div id="save-popup">✅ DATA SAVED</div>

    <div class="tab-wrapper no-print" id="tabContainer"></div>

    <div class="container">
        <div class="content-layer">
            
            <header>
                <h1><i class="fas fa-book-open"></i> Teacher's Timesheet Record</h1>
            </header>

            <div class="print-top-block">
                <div class="print-info-left">
                    <p style="font-size: 1.2rem; margin-bottom: 5px; border-bottom: 1px solid #eee;">TEACHER: <span id="pName">...</span></p>
                    <p>SCHOOL: <span id="pSchool">...</span></p>
                    <p>DATE: <span id="pDate"></span></p>
                </div>
                <div style="text-align:right; display:flex; gap:15px; align-items:center;">
                    <div style="font-size:0.75rem; font-family:sans-serif; line-height:1.3;">
                        <strong>BANKING INFO:</strong><br>
                        <span id="pBank">...</span><br>
                        Acc: <span id="pAccNum">...</span><br>
                        Name: <span id="pAccName">...</span>
                    </div>
                    <img id="qrCode" style="width: 100px; height: 100px; border: 1px solid #eee;">
                </div>
            </div>

            <div class="section-box no-print">
                <div class="one-line-grid" style="grid-template-columns: 2fr 2fr 1fr 0.8fr 0.8fr;">
                    <div class="form-group"><label>Teacher Name</label><input type="text" id="teacherName" oninput="saveGlobal()"></div>
                    <div class="form-group"><label>School Name (Tab)</label><input type="text" id="schoolNameInput" oninput="updateCurrentSchoolData()"></div>
                    <div class="form-group"><label>Rate/Hr</label><input type="number" id="hourlyRate" oninput="updateCurrentSchoolData()"></div>
                    <div class="form-group">
                        <label>Currency</label>
                        <select id="currency" onchange="updateCurrentSchoolData()">
                            <option value="VND">VND</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Tax %</label><select id="taxRate" onchange="updateCurrentSchoolData()"></select></div>
                </div>
            </div>

            <div class="white-card no-print" style="display: flex; justify-content: center; gap: 15px; align-items: center;">
                <strong>View Month:</strong>
                <select id="monthFilter" onchange="renderTable()" style="width: 120px;"></select>
                <select id="yearFilter" onchange="renderTable()" style="width: 100px;">
                    <option value="2024">2024</option>
                    <option value="2025" selected>2025</option>
                    <option value="2026">2026</option>
                </select>
            </div>

            <div class="white-card no-print">
                <div class="time-clock-row">
                    <div class="form-group"><label>Date</label><input type="date" id="inputDate"></div>
                    <div class="form-group"><label>Start</label><input type="time" id="startTime" value="08:00"></div>
                    <div class="form-group"><label>End</label><input type="time" id="endTime" value="09:00"></div>
                    <button class="btn-add" onclick="addSession()">ADD SESSION</button>
                </div>
            </div>

            <div class="white-card" style="padding: 0;">
                <table>
                    <thead><tr><th>Date</th><th>Range</th><th>Hours</th><th>Gross Pay</th><th class="no-print"></th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="chalkboard-box">
                <div class="total-item"><span id="monthLabel">Month</span> Hours:<span id="dispTotalH">0h 0m</span></div>
                <div class="total-item line-sep"><span>Gross Pay:</span><span id="dispGross">0</span></div>
                <div class="total-item"><span>Tax Deduction (<span id="dispTaxRate">0</span>%):</span><span id="dispTaxAmt">0</span></div>
                <div class="total-item line-sep net-due"><span>NET DUE:</span><span id="dispNet">0</span></div>
            </div>

            <div class="white-card no-print" style="margin-top:20px;">
                <label class="section-header">Banking Info</label>
                <div class="one-line-grid" style="grid-template-columns: 1fr 1.5fr 2fr;">
                    <div class="form-group"><label>Bank ID</label><input type="text" id="bankName" oninput="saveGlobal()"></div>
                    <div class="form-group"><label>Account Number</label><input type="text" id="accNumber" oninput="saveGlobal()"></div>
                    <div class="form-group"><label>Account Name</label><input type="text" id="accName" oninput="saveGlobal()"></div>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <h3 class="section-header"><i class="fas fa-calendar-check"></i> <span id="schoolSummaryName">School</span> Annual Summary</h3>
                <div class="white-card" id="annualHistory"></div>
            </div>

            <div class="controls no-print">
                <button onclick="saveAllData(true)">💾 SAVE DATA</button>
                <button onclick="window.print()">🖨️ PRINT PDF</button>
                <button onclick="exportToJson()">📤 EXPORT BACKUP</button>
                <button onclick="exportToCsv()" style="color: #28a745;">📊 EXPORT EXCEL (CSV)</button>
                <button onclick="document.getElementById('importFile').click()">📥 IMPORT BACKUP</button>
                <input type="file" id="importFile" style="display:none" accept=".json" onchange="importFromJson(event)">
                
                <button class="btn-clear-tab" onclick="clearCurrentMonth()" style="color:red">🗑️ CLEAR SELECTED MONTH</button>
                <button class="btn-clear-all" onclick="clearEverything()" style="background:#ef476f; color:white;">⚠️ CLEAR ALL DATA</button>
            </div>
        </div>
    </div>

<script>
    const STORAGE_KEY = 'teacherMulti_Master_v1';
    const GLOBAL_KEY = 'teacherGlobal_Master_v1';

    let allSchools = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [{ name: 'School 1', rate: 500000, tax: 10, currency: 'VND', logs: [] }];
    let activeIdx = 0;

    window.onload = function() {
        const monthSel = document.getElementById('monthFilter');
        const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        months.forEach((m, i) => {
            let opt = document.createElement('option');
            opt.value = String(i + 1).padStart(2, '0');
            opt.innerHTML = m;
            monthSel.appendChild(opt);
        });

        const today = new Date();
        monthSel.value = String(today.getMonth() + 1).padStart(2, '0');
        document.getElementById('yearFilter').value = today.getFullYear();

        const taxSel = document.getElementById('taxRate');
        for(let i=0; i<=50; i+=0.5) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerHTML = i.toFixed(1) + '%';
            taxSel.appendChild(opt);
        }

        loadGlobal();
        renderTabs();
        switchTab(0);
    }

    function renderTabs() {
        const container = document.getElementById('tabContainer');
        container.innerHTML = '';
        allSchools.forEach((school, index) => {
            const tab = document.createElement('div');
            tab.className = `school-tab ${index === activeIdx ? 'active' : ''}`;
            tab.innerHTML = `<span>${school.name}</span> <i class="fas fa-times" style="font-size:0.7rem; margin-left:8px;" onclick="deleteTab(event, ${index})"></i>`;
            tab.onclick = () => switchTab(index);
            container.appendChild(tab);
        });
        const addBtn = document.createElement('button');
        addBtn.className = 'add-tab-btn'; addBtn.innerHTML = '+'; addBtn.onclick = addNewSchool;
        container.appendChild(addBtn);
    }

    function switchTab(index) {
        activeIdx = index;
        const school = allSchools[activeIdx];
        document.getElementById('schoolNameInput').value = school.name;
        document.getElementById('hourlyRate').value = school.rate;
        document.getElementById('taxRate').value = school.tax || 0;
        document.getElementById('currency').value = school.currency || 'VND';
        document.getElementById('inputDate').valueAsDate = new Date();
        renderTabs(); renderTable();
    }

    function addNewSchool() {
        allSchools.push({ name: 'New School', rate: 500000, tax: 10, currency: 'VND', logs: [] });
        switchTab(allSchools.length - 1);
        saveAllData();
    }

    function deleteTab(e, index) {
        e.stopPropagation();
        if(allSchools.length === 1) return;
        if(confirm("Delete this school tab?")) {
            allSchools.splice(index, 1);
            activeIdx = 0;
            saveAllData();
            switchTab(0);
        }
    }

    function updateCurrentSchoolData() {
        const school = allSchools[activeIdx];
        school.name = document.getElementById('schoolNameInput').value;
        school.rate = parseFloat(document.getElementById('hourlyRate').value) || 0;
        school.tax = parseFloat(document.getElementById('taxRate').value) || 0;
        school.currency = document.getElementById('currency').value;
        renderTabs(); renderTable();
    }

    function addSession() {
        const d = document.getElementById('inputDate').value;
        const s = document.getElementById('startTime').value;
        const e = document.getElementById('endTime').value;
        if(!d || !s || !e) return;
        const start = new Date(`2000-01-01T${s}:00`);
        const end = new Date(`2000-01-01T${e}:00`);
        const dec = (end - start) / 3600000;
        if(dec <= 0) return alert("Check times!");
        allSchools[activeIdx].logs.push({ id: Date.now(), date: d, range: `${s}-${e}`, dec: dec });
        document.getElementById('monthFilter').value = d.substring(5,7);
        document.getElementById('yearFilter').value = d.substring(0,4);
        saveAllData(); renderTable();
    }

    function deleteLog(id) {
        allSchools[activeIdx].logs = allSchools[activeIdx].logs.filter(l => l.id !== id);
        saveAllData(); renderTable();
    }

    function saveGlobal() {
        const data = {
            teacher: document.getElementById('teacherName').value,
            bank: document.getElementById('bankName').value,
            acc: document.getElementById('accNumber').value,
            accName: document.getElementById('accName').value
        };
        localStorage.setItem(GLOBAL_KEY, JSON.stringify(data));
        updateHeaderUI(data);
    }

    function loadGlobal() {
        const data = JSON.parse(localStorage.getItem(GLOBAL_KEY)) || { teacher: '', bank: '', acc: '', accName: '' };
        document.getElementById('teacherName').value = data.teacher || "";
        document.getElementById('bankName').value = data.bank || "";
        document.getElementById('accNumber').value = data.acc || "";
        document.getElementById('accName').value = data.accName || "";
        updateHeaderUI(data);
    }

    function saveAllData(show) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allSchools));
        saveGlobal();
        if(show) {
            document.getElementById('save-popup').style.display = 'block';
            setTimeout(() => document.getElementById('save-popup').style.display = 'none', 2000);
        }
    }

    function format(val, cur) {
        return new Intl.NumberFormat(cur === 'VND' ? 'vi-VN' : 'en-US', { style: 'currency', currency: cur }).format(val);
    }

    function renderTable() {
        const school = allSchools[activeIdx];
        const body = document.getElementById('tableBody');
        const selM = document.getElementById('monthFilter').value;
        const selY = document.getElementById('yearFilter').value;
        const filterKey = `${selY}-${selM}`;
        
        body.innerHTML = '';
        document.getElementById('schoolSummaryName').innerText = school.name;
        
        let monthDec = 0;
        let yearlyAgg = {};

        school.logs.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(l => {
            const logMonthKey = l.date.substring(0, 7);
            const logYear = l.date.substring(0, 4);
            const pay = l.dec * school.rate;

            if(logYear === selY) {
                if(!yearlyAgg[logMonthKey]) yearlyAgg[logMonthKey] = { h: 0, m: 0 };
                yearlyAgg[logMonthKey].h += l.dec;
                yearlyAgg[logMonthKey].m += pay;
            }

            if(logMonthKey === filterKey) {
                monthDec += l.dec;
                body.innerHTML += `<tr><td>${l.date}</td><td>${l.range}</td><td>${l.dec.toFixed(2)}h</td><td>${format(pay, school.currency)}</td><td class="no-print"><i class="fas fa-trash" onclick="deleteLog(${l.id})"></i></td></tr>`;
            }
        });

        const gross = monthDec * school.rate;
        const tax = gross * (school.tax / 100);
        document.getElementById('dispTotalH').innerText = `${Math.floor(monthDec)}h ${Math.round((monthDec%1)*60)}m`;
        document.getElementById('dispGross').innerText = format(gross, school.currency);
        document.getElementById('dispTaxRate').innerText = school.tax;
        document.getElementById('dispTaxAmt').innerText = "- " + format(tax, school.currency);
        document.getElementById('dispNet').innerText = format(gross - tax, school.currency);
        document.getElementById('monthLabel').innerText = document.getElementById('monthFilter').options[document.getElementById('monthFilter').selectedIndex].text;

        const histDiv = document.getElementById('annualHistory');
        histDiv.innerHTML = '';
        const monthsFound = Object.keys(yearlyAgg).sort().reverse();
        monthsFound.forEach(mk => {
            const d = new Date(mk + "-02");
            histDiv.innerHTML += `<div class="history-row"><strong>${d.toLocaleString('default',{month:'long'})}</strong><span>${format(yearlyAgg[mk].m, school.currency)}</span></div>`;
        });

        updateHeaderUI(JSON.parse(localStorage.getItem(GLOBAL_KEY)) || {});
    }

    function updateHeaderUI(data) {
        document.getElementById('pName').innerText = data.teacher;
        document.getElementById('pSchool').innerText = allSchools[activeIdx].name;
        document.getElementById('pBank').innerText = (data.bank || "").toUpperCase();
        document.getElementById('pAccNum').innerText = data.acc;
        document.getElementById('pAccName').innerText = data.accName;
        document.getElementById('pDate').innerText = new Date().toLocaleDateString();
        const qrUrl = `https://img.vietqr.io/image/${(data.bank||"").toLowerCase()}-${data.acc}-compact.jpg?accountName=${encodeURIComponent(data.accName)}`;
        document.getElementById('qrCode').src = qrUrl;
    }

    function clearCurrentMonth() {
        if(confirm("Delete all entries for the CURRENTLY SELECTED month?")) {
            const selM = document.getElementById('monthFilter').value;
            const selY = document.getElementById('yearFilter').value;
            const filterKey = `${selY}-${selM}`;
            allSchools[activeIdx].logs = allSchools[activeIdx].logs.filter(l => l.date.substring(0,7) !== filterKey);
            saveAllData(); renderTable();
        }
    }

    function clearEverything() { if(confirm("Delete EVERYTHING?")) { localStorage.clear(); location.reload(); } }

    function exportToJson() {
        const data = { schools: allSchools, global: JSON.parse(localStorage.getItem(GLOBAL_KEY)) };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `timesheet_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    function exportToCsv() {
        let csv = "School,Teacher,Date,Time Range,Hours,Rate,Gross Pay,Tax %,Net Pay,Currency\n";
        const teacher = document.getElementById('teacherName').value;
        allSchools.forEach(s => {
            s.logs.forEach(l => {
                const gross = l.dec * s.rate;
                const net = gross * (1 - (s.tax/100));
                csv += `"${s.name}","${teacher}",${l.date},${l.range},${l.dec.toFixed(2)},${s.rate},${gross.toFixed(2)},${s.tax},${net.toFixed(2)},${s.currency}\n`;
            });
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `timesheet_export_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    }

    function importFromJson(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.schools && data.global) {
                    if (confirm("Restore from backup? This will overwrite current data.")) {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(data.schools));
                        localStorage.setItem(GLOBAL_KEY, JSON.stringify(data.global));
                        location.reload();
                    }
                } else { alert("Invalid file format."); }
            } catch (err) { alert("Error parsing file."); }
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
